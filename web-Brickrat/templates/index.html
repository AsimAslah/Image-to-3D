<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TripoSR Product Studio</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <main class="shell">
    <header><span class="eyebrow">FURNITURE CATALOG</span><h1>Turn a product photo into a 3D listing.</h1></header>
    <form id="product-form" class="card" hx-post="/products" hx-target="#save-result" hx-swap="innerHTML">
      <section>
        <h2>Product details</h2>
        <div class="grid">
          <label>Product name<input name="name" required placeholder="Oak lounge chair"></label>
          <label>Category<input name="category" required placeholder="Furniture"></label>
          <label>Sub-category<input name="subcategory" required placeholder="Chairs"></label>
          <label>Price<input name="price" type="number" min="0" step="0.01" placeholder="249.00"></label>
        </div>
        <label>Description<textarea name="description" rows="3" placeholder="Materials, dimensions, finish…"></textarea></label>
      </section>
      <section class="divider">
        <h2>Create the 3D model</h2>
        <div id="conversion-result" class="result muted">Upload an image, then convert it to unlock saving.</div>
      </section>
      <button id="save-button" class="primary" type="submit" disabled>Save to Supabase</button>
      <div id="save-result"></div>
    </form>
    <form class="card upload" hx-post="/convert" hx-target="#conversion-result" hx-swap="innerHTML" hx-encoding="multipart/form-data" hx-indicator="#busy">
      <label>Product image<input name="image" type="file" accept="image/png,image/jpeg,image/webp" required></label>
      <div class="options">
        <label class="check"><input name="remove_background" type="checkbox" value="true" checked> Remove background</label>
        <label>Foreground ratio<input name="foreground_ratio" type="number" value="0.85" min="0.5" max="1" step="0.05"></label>
        <label>Resolution<select name="resolution"><option>128</option><option selected>256</option><option>320</option></select></label>
      </div>
      <button class="secondary" type="submit">Convert to 3D</button>
      <span id="busy" class="htmx-indicator">Generating—this can take a few minutes…</span>
    </form>
  </main>
</body>
</html>
